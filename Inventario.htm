<style>
:root{--bg:#1E1F22;--card:#2A2C31;--sub:#313338;--accent:#48B0BD;--txt:#E0E0E0;--txt2:#A0A0A0;--border:#3A3C42;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);padding-bottom:60px;}
.header{background:#25272C;padding:15px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--accent);text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.5);}
.header h2{color:var(--accent);letter-spacing:3px;font-size:20px;margin-bottom:10px;}
#searchBar{width:90%;max-width:600px;padding:11px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:15px;outline:none;transition:.3s;}
#searchBar:focus{border-color:var(--accent);}
.container{max-width:900px;margin:20px auto;padding:0 12px;}

/* CATEGORIA PRINCIPAL */
.cat-group{background:var(--card);margin-bottom:10px;border-radius:8px;border:1px solid var(--border);overflow:hidden;}
.cat-header{padding:15px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px;border-left:4px solid var(--accent);transition:.2s;user-select:none;}
.cat-header:hover{background:var(--sub);}
.cat-header .arrow{transition:.3s;color:var(--accent);font-size:13px;}
.cat-header.open .arrow{transform:rotate(90deg);}
.cat-count{background:var(--accent);color:#000;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}

/* SUBCATEGORIA */
.sub-list{display:none;background:var(--sub);padding:6px 0;}
.sub-group{margin:4px 10px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.sub-header{padding:11px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--accent);background:#2E3035;transition:.2s;user-select:none;}
.sub-header:hover{background:#35373D;}
.sub-header .arrow{transition:.3s;font-size:12px;}
.sub-header.open .arrow{transform:rotate(90deg);}
.sub-count{background:#2A2C31;color:var(--txt2);padding:2px 8px;border-radius:10px;font-size:10px;}

/* PRODUCTOS */
.prod-list{display:none;background:#25272C;}
.prod-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.prod-item:last-child{border-bottom:none;}
.prod-name{color:var(--txt);flex:1;padding-right:10px;}
.price{color:#4EC97A;font-weight:700;font-family:'Courier New',monospace;font-size:13px;white-space:nowrap;}
</style>
</head>

function fmt(n){return"$"+n.toLocaleString("es-CO");}

function build(){
  const cat=document.getElementById("catalog");
  cat.innerHTML="";
  for(const[catName,subs] of Object.entries(DATA)){
    let total=0;
    for(const items of Object.values(subs)) total+=items.length;
    const cg=document.createElement("div");
    cg.className="cat-group";
    let subsHTML="";
    for(const[subName,items] of Object.entries(subs)){
      const prods=items.map(i=>`
        <div class="prod-item">
          <span class="prod-name">${i[0]}</span>
          <span class="price">${fmt(i[1])}</span>
        </div>`).join("");
      subsHTML+=`
        <div class="sub-group">
          <div class="sub-header" onclick="toggleSub(this)">
            <span>▸ ${subName}</span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span class="sub-count">${items.length}</span>
              <span class="arrow">▸</span>
            </span>
          </div>
          <div class="prod-list">${prods}</div>
        </div>`;
    }
    cg.innerHTML=`
      <div class="cat-header" onclick="toggleCat(this)">
        <span>${catName}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="cat-count">${total}</span>
          <span class="arrow">▸</span>
        </span>
      </div>
      <div class="sub-list">${subsHTML}</div>`;
    cat.appendChild(cg);
  }
}

function toggleCat(el){
  el.classList.toggle("open");
  const sl=el.nextElementSibling;
  sl.style.display=sl.style.display==="block"?"none":"block";
}

function toggleSub(el){
  el.classList.toggle("open");
  const pl=el.nextElementSibling;
  pl.style.display=pl.style.display==="block"?"none":"block";
}

function runFilter(){
  const q=document.getElementById("searchBar").value.toLowerCase().trim();
  if(q===""){
    document.querySelectorAll(".prod-list").forEach(p=>p.style.display="none");
    document.querySelectorAll(".sub-list").forEach(s=>s.style.display="none");
    document.querySelectorAll(".cat-header").forEach(h=>h.classList.remove("open"));
    document.querySelectorAll(".sub-header").forEach(h=>h.classList.remove("open"));
    document.querySelectorAll(".prod-item").forEach(p=>p.style.display="flex");
    return;
  }
  document.querySelectorAll(".prod-item").forEach(p=>{
    const match=p.innerText.toLowerCase().includes(q);
    p.style.display=match?"flex":"none";
  });
  document.querySelectorAll(".sub-group").forEach(sg=>{
    const visible=[...sg.querySelectorAll(".prod-item")].some(p=>p.style.display==="flex");
    sg.querySelector(".prod-list").style.display=visible?"block":"none";
    sg.querySelector(".sub-header").classList.toggle("open",visible);
  });
  document.querySelectorAll(".cat-group").forEach(cg=>{
    const visible=[...cg.querySelectorAll(".prod-item")].some(p=>p.style.display==="flex");
    cg.querySelector(".sub-list").style.display=visible?"block":"none";
    cg.querySelector(".cat-header").classList.toggle("open",visible);
  });
}

build();
</script>
