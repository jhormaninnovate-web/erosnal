<script>
const btn = document.getElementById("iaFloatingBtn");
let isDragging = false;
let startX, startY;

// Evento cuando se empieza a tocar el botón
btn.addEventListener("touchstart", (e) => {
    isDragging = false; // Reset por si es solo un click
    startX = e.touches[0].clientX - btn.offsetLeft;
    startY = e.touches[0].clientY - btn.offsetTop;
});

// Evento mientras se arrastra el dedo
btn.addEventListener("touchmove", (e) => {
    isDragging = true; // Si se movió, ya no es un simple click
    e.preventDefault(); // Evita que la pantalla se mueva mientras arrastras el botón

    let x = e.touches[0].clientX - startX;
    let y = e.touches[0].clientY - startY;

    // Límites para que no se salga de la pantalla
    const maxX = window.innerWidth - btn.offsetWidth;
    const maxY = window.innerHeight - btn.offsetHeight;

    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    btn.style.left = x + "px";
    btn.style.top = y + "px";
    btn.style.right = "auto";
    btn.style.bottom = "auto";
});

// Evento al levantar el dedo
btn.addEventListener("touchend", (e) => {
    // Si NO hubo arrastre, abrimos el chat (fue un click normal)
    if (!isDragging) {
        toggleIA();
    }
    isDragging = false;
});

function toggleIA() {
    const chat = document.getElementById("chatIA");
    if (chat.style.display === "flex") {
        chat.style.display = "none";
        document.body.style.overflow = "auto";
    } else {
        chat.style.display = "flex";
        // En móvil bloqueamos el scroll de fondo para que no moleste al chatear
        if (window.innerWidth <= 768) {
            document.body.style.overflow = "hidden";
        }
    }
}
</script>
