<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INDUMAG | Oficial</title>

    <style>
        :root {
            --primario: #519a2e; 
            --primario-hover: #3e7a23;
            --negro: #0f0f0f;
            --negro2: #131317;
            --gris: #1c1c22;
            --gris2: #23232a;
            --texto: #e4e4e4;
            --blanco: #ffffff;
            --borde: #2b2b2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: var(--negro2);
            color: var(--texto);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* HEADER */
        header {
            background: #2f3545; 
            border-bottom: 1px solid var(--borde);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1300px;
            margin: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-main { height: 60px; }

        .search-box {
            flex: 1;
            background: var(--blanco);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--borde);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--texto);
        }

        .ia-toggle {
            background: var(--gris);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            color: var(--texto);
            transition: 0.3s;
            white-space: nowrap;
        }

        .ia-toggle:hover {
            background: var(--primario);
            color: var(--blanco);
        }

        /* SPLIT HERO */
        .split-container {
            display: flex;
            flex-direction: column;
            height: 75vh;
        }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .split-container:hover .section { flex: 0.9; }
            .section:hover { flex: 1.3 !important; }
        }

        .section {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            padding: 40px;
            cursor: pointer;
            transition: 0.5s;
            overflow: hidden;
        }

        .section .bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: 1s;
        }

        .section:hover .bg { transform: scale(1.05); }

        .section::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
            z-index: 2;
        }

        .content { position: relative; z-index: 3; }

        .content h2 {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--blanco);
            line-height: 1;
        }

        .line {
            width: 50px;
            height: 4px;
            background: var(--primario);
            margin: 15px 0;
        }

        .btn-action {
            background: var(--primario);
            padding: 12px 24px;
            border-radius: 6px;
            color: var(--blanco);
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        /* --- SECCIÓN CARRUSEL (FONDO BLANCO) --- */
        .brand-footer {
            background: #2f3545; 
            padding: 30px 0;
            text-align: center;
            overflow: hidden;
        }

        .footer-title {
            text-transform: uppercase;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 800;
            color: #ffffff; /* Texto oscuro para fondo blanco */
            letter-spacing: 2px;
        }

        .footer-title span { color: var(--primario); }

        .track {
            background: #ffffff;
            display: flex;
            width: max-content;
            gap: 80px;
            animation: scroll 30s linear infinite;
            align-items: center;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .logo-box { width: 150px; flex-shrink: 0; }
        .logo-box img {
            width: 100%;
            filter: grayscale(1);
            opacity: 0.7;
            transition: 0.3s;
        }

        .logo-box img:hover {
            filter: grayscale(0);
            opacity: 1;
        }

        /* CHAT IA */
        #chatIA {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #111;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--borde);
            overflow: hidden;
            z-index: 10000;
        }

        #chatIA header {
            background: #2f3545; 
            padding: 15px;
            color: var(--primario);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde);
        }

        #chatIA main {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #ffffff;
        }

        #chatIA footer {
            padding: 15px;
            background: var(--negro);
            display: flex;
            gap: 8px;
        }

        #chatIA input {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        /* BOTÓN IA MOVIL */
        #iaFloatingBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primario);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 20px rgba(81, 154, 46, 0.4);
            cursor: pointer;
            z-index: 10001;
        }

        @media (max-width: 768px) {
            #iaFloatingBtn { display: flex; }
            .content h2 { font-size: 32px; }
            #chatIA { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
        }
    </style>
</head>

<body>

<header>
    <div class="header-content">
        <img src="https://www.indumag.co/wp-content/uploads/2026/04/Logo_INDUMAG_nuevo.png" class="logo-main">
        <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" stroke="#888" fill="none" viewBox="0 0 24 24" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>

            <input placeholder="Buscar equipos, repuestos...">
            <button class="ia-toggle" onclick="toggleIA()">MODO IA</button>
        </div>
        <div class="login-icon">
            <svg width="28" height="28" stroke="#888" fill="none" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="7" r="4"/><path d="M5 21v-2a7 7 0 0 1 14 0v2"/>
            </svg>
        </div>
    </div>
</header>

<div class="split-container">
    <a href="#" class="section">
        <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&w=1200&q=80');"></div>
        <div class="content">
            <h2>Servicio<br>Técnico</h2>
            <div class="line"></div>
            <div class="btn-action">Solicitar reparación</div>
        </div>
    </a>
    <a href="#" class="section">
        <div class="bg" style="background-image:url('https://millerweldslatam.com/wp-content/uploads/2025/09/soldadora-syncrowave-212-coolmate-2-miller-welds-400x400.jpg');"></div>
        <div class="content">
            <h2>Equipos y<br>Repuestos</h2>
            <div class="line"></div>
            <div class="btn-action">Ver catálogo</div>
        </div>
    </a>
</div>

<div class="brand-footer">
    <h1 class="footer-title">Servicio Técnico <span>Autorizado</span></h1>
    <div class="track">
        <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Lincoln_Electric_logo.svg"></div>
        <div class="logo-box"><img src="https://millerweldseurope.com/wp-content/uploads/2021/09/Miller-Logo-C-2.png"></div>
        <div class="logo-box"><img src="https://cdn.worldvectorlogo.com/logos/esab.svg"></div>
        <div class="logo-box"><img src="https://image.jimcdn.com/app/cms/image/transf/none/path/s98d3e305ba298bb3/image/i64b6b69472d9ff76/version/1587132801/image.jpg"></div>
        <div class="logo-box"><img src="https://mundodotaciones.com/wp-content/uploads/2024/05/sweiss.png"></div>
        <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Lincoln_Electric_logo.svg"></div>
        <div class="logo-box"><img src="https://millerweldseurope.com/wp-content/uploads/2021/09/Miller-Logo-C-2.png"></div>
        <div class="logo-box"><img src="https://cdn.worldvectorlogo.com/logos/esab.svg"></div>
        <div class="logo-box"><img src="https://image.jimcdn.com/app/cms/image/transf/none/path/s98d3e305ba298bb3/image/i64b6b69472d9ff76/version/1587132801/image.jpg"></div>
        <div class="logo-box"><img src="https://mundodotaciones.com/wp-content/uploads/2024/05/sweiss.png"></div>
    </div>
</div>

<div id="chatIA">
    <header><span>✨ Asistente IA Indumag</span><span style="cursor:pointer;" onclick="toggleIA()">✕</span></header>
    <main id="chatBody">
        <div style="background: #222; padding: 10px; border-radius: 10px; border-left: 3px solid var(--primario);">
            Hola, soy tu asesor experto. ¿Qué necesitas hoy?
        </div>
    </main>
    <footer>
        <input id="chatInput" placeholder="Pregúntame lo que quieras..." />
        <button onclick="sendMessage()" style="color: white;">➤</button>
    </footer>
</div>

<div id="iaFloatingBtn" onclick="toggleIA()">IA</div>

<script>
function toggleIA() {
    const chat = document.getElementById("chatIA");
    chat.style.display = (chat.style.display === "flex") ? "none" : "flex";
}
function sendMessage() {
    const input = document.getElementById("chatInput");
    const body = document.getElementById("chatBody");
    if (!input.value.trim()) return;
    body.innerHTML += `<div style="text-align: right; margin: 10px 0;"><span style="background: var(--primario); padding: 8px 12px; border-radius: 10px; display: inline-block;">${input.value}</span></div>`;
    input.value = "";
    body.scrollTop = body.scrollHeight;
}
</script>

</body>
</html>
